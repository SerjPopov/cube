<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кубик - Таймер граней</title>
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/cube/manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="72x72" href="/cube/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/cube/icon-96x96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/cube/icon-128x128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/cube/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/cube/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/cube/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="384x384" href="/cube/icon-384x384.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/cube/icon-512x512.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/cube/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/cube/icon-16x16.png">
    <link rel="shortcut icon" href="/cube/icon-192x192.png">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .version {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            opacity: 0.7;
            margin-top: 4px;
        }

        .status-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.connected {
            background: var(--success-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .current-face {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .faces-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .face-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .face-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .face-card.active {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .face-name {
            font-weight: 500;
            font-size: 16px;
        }

        .face-time {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .total-time {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .total-time-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .total-time-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 52px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--background);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #b91c1c;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--danger-color);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
        }

        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: var(--success-color);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
        }

        .icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <header class="header">
                <h1>🎲 Кубик</h1>
                <p>Таймер времени для каждой грани</p>
                <div class="version">{{ version }}</div>
            </header>

            <div v-if="error" class="error">
                {{ error }}
            </div>

            <div v-if="success" class="success">
                {{ success }}
            </div>

            <div class="status-card">
                <div class="status-indicator">
                    <div class="status-dot" :class="{ connected: isConnected }"></div>
                    <span>{{ connectionStatus }}</span>
                </div>
                <div v-if="currentFace" class="current-face">
                    Текущая грань: {{ currentFace }}
                </div>
            </div>

            <div class="faces-grid">
                <div v-for="(time, face) in faces" 
                     :key="face" 
                     class="face-card"
                     :class="{ active: face === currentFace }">
                    <span class="face-name">{{ face }}</span>
                    <span class="face-time">{{ formatTime(time) }}</span>
                </div>
            </div>

            <div class="total-time">
                <div class="total-time-label">Общее время</div>
                <div class="total-time-value">{{ formatTime(totalTime) }}</div>
            </div>

            <div class="actions">
                 <button v-if="showInstallButton" 
                         @click="installPWA" 
                         class="btn btn-primary">
                     📱 Установить приложение
                 </button>

                 <button @click="connect" 
                         :disabled="isConnecting || isConnected" 
                         class="btn btn-primary">
                     <span v-if="isConnecting" class="loading"></span>
                     {{ connectButtonText }}
                 </button>

                <button @click="resetCounters" 
                        :disabled="!isConnected || isResetting" 
                        class="btn btn-danger">
                    <span v-if="isResetting" class="loading"></span>
                    🔄 Кубик обнулись
                </button>

                <button @click="shareData" 
                        :disabled="!hasData" 
                        class="btn btn-secondary">
                    📤 Кубик поделись
                </button>

                <button v-if="debug" @click="shareLogs" 
                        class="btn btn-secondary">
                    📋 Поделиться логами
                </button>


            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        // Регистрация Service Worker с отладкой
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then((registration) => {
                        console.log('SW зарегистрирован:', registration);
                        
                        // Проверяем активацию
                        if (registration.active) {
                            console.log('SW активен:', registration.active);
                        }
                        
                        // Ожидаем активации
                        if (registration.installing) {
                            registration.installing.addEventListener('statechange', () => {
                                if (registration.installing.state === 'activated') {
                                    console.log('SW активирован');
                                }
                            });
                        }
                    })
                    .catch((registrationError) => {
                        console.error('Ошибка регистрации SW:', registrationError);
                        
                        // Дополнительная диагностика
                        console.log('URL SW:', window.location.origin + '/sw.js');
                        console.log('User Agent:', navigator.userAgent);
                    });
            });
        } else {
            console.warn('Service Worker не поддерживается');
        }
    </script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    isConnected: false,
                    isConnecting: false,
                    isResetting: false,
                    error: '',
                    success: '',
                    currentFace: '',
                    faces: {
                        'ОргВопросы': 0,
                        'ВладИнтеграции': 0,
                        'ТехВопросы': 0,
                        'МоиЗадачи': 0,
                        'НеРабота': 0,
                        'ЭлмСофтBAK': 0
                    },
                    totalTime: 0,
                    bluetoothDevice: null,
                    characteristic: null,
                    
                    // Константы BLE
                    CUBE_UUID: '85301596-98b5-b0bb-e882-fd4f797fbdb2',
                    SERVICE_UUID: '4FAFC201-1FB5-459E-8FCC-C5C9C331914B',
                    CHARACTERISTIC_UUID: 'BEB5483E-36E1-4688-B7F5-EA07361B26A8',
                    
                     // Отладка
                    debug: true,
                    logs: [],
                    
                    // PWA
                    deferredPrompt: null,
                    showInstallButton: false,
                    
                    // Версия приложения
                    version: 'v1.1.4'
                }
            },
            computed: {
                connectionStatus() {
                    if (this.isConnecting) return 'Подключение...';
                    if (this.isConnected) return 'Подключено';
                    return 'Не подключено';
                },
                connectButtonText() {
                    if (this.isConnecting) return 'Подключение...';
                    return '🎯 Кубик отзовись';
                },
                hasData() {
                    return this.totalTime > 0 || Object.values(this.faces).some(time => time > 0);
                }
            },
            methods: {
                // Логирование операций
                log(message, data = null) {
                    if (!this.debug) return;
                    
                    const timestamp = new Date().toISOString();
                    const logEntry = {
                        timestamp,
                        message,
                        data: data ? JSON.stringify(data, null, 2) : null
                    };
                    
                    this.logs.push(logEntry);
                    console.log(`[Cube BLE] ${timestamp}: ${message}`, data || '');
                    
                    // Сохраняем логи в localStorage с правильной кодировкой
                    try {
                        const logsString = JSON.stringify(this.logs);
                        localStorage.setItem('cubeLogs', logsString);
                    } catch (error) {
                        console.error('Ошибка сохранения логов:', error);
                    }
                },

                // Получение всех логов
                getLogs() {
                    return this.logs;
                },

                // Очистка логов
                clearLogs() {
                    this.logs = [];
                    localStorage.removeItem('cubeLogs');
                    this.log('Логи очищены');
                },

                // Экспорт логов
                exportLogs() {
                    const logsText = this.logs.map(log => {
                        let logEntry = `[${log.timestamp}] ${log.message}`;
                        if (log.data) {
                            logEntry += '\n' + log.data;
                        }
                        return logEntry;
                    }).join('\n\n');
                    
                    return logsText;
                },
                async connect() {
                    this.clearMessages();
                    this.isConnecting = true;
                    this.log('Начало подключения к кубику');

                    // Проверка поддержки
                    if (!navigator.bluetooth) {
                        this.handleNoBluetoothSupport();
                        this.isConnecting = false;
                        return;
                    }

                    try {
                        // Используем БЕЗОПАСНЫЙ фильтр
                        this.log('Запрос устройства BLE', {
                            filters: [{ services: [this.SERVICE_UUID] }]
                        });
                        
                        this.bluetoothDevice = await navigator.bluetooth.requestDevice({
                            filters: [{ services: [this.SERVICE_UUID] }] // Фильтр по UUID сервиса
                        });
                        
                        this.log('Устройство найдено', {
                            name: this.bluetoothDevice.name,
                            id: this.bluetoothDevice.id
                        });

                        // Подключение к устройству
                        this.log('Подключение к GATT серверу');
                        const server = await this.bluetoothDevice.gatt.connect();
                        this.log('GATT сервер подключен');
                        
                        // Получение сервиса
                        this.log('Поиск сервиса', { serviceUUID: this.SERVICE_UUID });
                        const service = await server.getPrimaryService(this.SERVICE_UUID);
                        this.log('Сервис найден', { serviceUUID: service.uuid });
                        
                        // Получение характеристики
                        this.log('Поиск характеристики', { characteristicUUID: this.CHARACTERISTIC_UUID });
                        this.characteristic = await service.getCharacteristic(this.CHARACTERISTIC_UUID);
                        this.log('Характеристика найдена', { 
                            characteristicUUID: this.characteristic.uuid,
                            properties: this.characteristic.properties
                        });
                        
                        // Чтение данных
                        this.log('Чтение данных с устройства');
                        await this.readData();
                        this.log('Данные успешно прочитаны');
                        
                        this.isConnected = true;
                        this.success = 'Успешно подключено к кубику!';
                        this.log('Подключение успешно завершено');
                        
                        // Обработка отключения
                        this.bluetoothDevice.addEventListener('gattserverdisconnected', () => {
                            this.log('Соединение с кубиком потеряно');
                            this.isConnected = false;
                            this.error = 'Соединение с кубиком потеряно';
                        });

                    } catch (error) {
                        this.log('Ошибка подключения', { 
                            name: error.name,
                            message: error.message,
                            stack: error.stack
                        });
                        console.error('Ошибка подключения:', error);
                        this.error = `Ошибка подключения: ${error.message}`;
                    } finally {
                        this.isConnecting = false;
                        this.log('Процесс подключения завершен');
                    }
                },

                async readData() {
                    try {
                        this.log('Чтение значения характеристики');
                        const value = await this.characteristic.readValue();
                        this.log('Значение прочитано', {
                            byteLength: value.byteLength,
                            bytes: Array.from(new Uint8Array(value))
                        });
                        
                        const text = new TextDecoder().decode(value);
                        this.log('Декодирование текста', { 
                            textLength: text.length,
                            text: text.substring(0, 200) + (text.length > 200 ? '...' : '')
                        });
                        
                        this.parseData(text);
                    } catch (error) {
                        this.log('Ошибка чтения данных', { 
                            name: error.name,
                            message: error.message,
                            stack: error.stack
                        });
                        console.error('Ошибка чтения данных:', error);
                        throw error;
                    }
                },

                parseData(text) {
                    this.log('Начало парсинга данных', { textLength: text.length, textPreview: text.substring(0, 200) });
                    try {
                        // Парсинг текущей грани
                        const currentFaceMatch = text.match(/currentAge = ([^.,]+)/);
                        this.log('Парсинг текущей грани', { match: !!currentFaceMatch, face: currentFaceMatch ? currentFaceMatch[1].trim() : null });
                        if (currentFaceMatch) {
                            this.currentFace = currentFaceMatch[1].trim();
                            this.log('Текущая грань установлена', { face: this.currentFace });
                        }

                        // Парсинг счетчиков по граням
                        Object.keys(this.faces).forEach(face => {
                            const regex = new RegExp(`${face}\\s*=\\s*(\\d+)\\s*min`);
                            const match = text.match(regex);
                            
                            if (match) {
                                const oldValue = this.faces[face];
                                this.faces[face] = parseInt(match[1]);
                                this.log(`Грань ${face} обновлена`, { old: oldValue, new: this.faces[face] });
                            } else {
                                this.log(`Грань ${face} не найдена в данных`);
                            }
                        });

                        // Парсинг общего времени
                        const totalTimeMatch = text.match(/totalTime = ([^,]+)/);
                        this.log('Парсинг общего времени', { match: !!totalTimeMatch, timeString: totalTimeMatch ? totalTimeMatch[1] : null });
                        if (totalTimeMatch) {
                            const oldTime = this.totalTime;
                            this.totalTime = this.parseTimeString(totalTimeMatch[1]);
                            this.log('Общее время обновлено', { old: oldTime, new: this.totalTime });
                        }

                        // Логируем финальное состояние
                        this.log('Финальное состояние после парсинга', {
                            currentFace: this.currentFace,
                            faces: this.faces,
                            totalTime: this.totalTime
                        });

                        // Принудительное обновление реактивности Vue
                        this.$forceUpdate();
                        
                        // Сохранение в локальное хранилище
                        this.saveToLocalStorage();
                        
                    } catch (error) {
                        this.log('Ошибка парсинга данных', { error: error.message, stack: error.stack });
                        console.error('Ошибка парсинга данных:', error);
                    }
                },

                parseTimeString(timeStr) {
                    this.log('Парсинг строки времени', { timeStr: timeStr });
                    // Парсинг строки типа "3s 692ms" в миллисекунды
                    const seconds = timeStr.match(/(\d+)s/);
                    const milliseconds = timeStr.match(/(\d+)ms/);
                    
                    this.log('Компоненты времени', { seconds, milliseconds });
                    
                    let total = 0;
                    if (seconds) total += parseInt(seconds[1]) * 1000;
                    if (milliseconds) total += parseInt(milliseconds[1]);
                    
                    const minutes = Math.round(total / 60000); // Конвертация в минуты
                    this.log('Результат конвертации', { totalMs: total, minutes: minutes });
                    return minutes;
                },

                async resetCounters() {
                    this.clearMessages();
                    this.isResetting = true;
                    this.log('Начало сброса счетчиков');

                    try {
                        // Отправка команды сброса (значение 1)
                        const command = new Uint8Array([1]);
                        this.log('Отправка команды сброса', { command: Array.from(command) });
                        
                        await this.characteristic.writeValue(command);
                        this.log('Команда сброса отправлена успешно');
                        
                        // Ожидание и повторное чтение данных
                        this.log('Ожидание 1 секунду после сброса');
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                        this.log('Повторное чтение данных после сброса');
                        await this.readData();
                        
                        this.success = 'Счетчики успешно сброшены!';
                        this.log('Счетчики успешно сброшены');
                        
                    } catch (error) {
                        this.log('Ошибка сброса счетчиков', { 
                            name: error.name,
                            message: error.message,
                            stack: error.stack
                        });
                        console.error('Ошибка сброса счетчиков:', error);
                        this.error = `Ошибка сброса: ${error.message}`;
                    } finally {
                        this.isResetting = false;
                        this.log('Процесс сброса счетчиков завершен');
                    }
                },

                async shareData() {
                    try {
                        const shareText = this.generateShareText();
                        
                        if (navigator.share) {
                            await navigator.share({
                                title: 'Статистика кубика',
                                text: shareText
                            });
                        } else {
                            // Fallback для браузеров без Web Share API
                            await this.copyToClipboard(shareText);
                            this.success = 'Данные скопированы в буфер обмена';
                        }
                    } catch (error) {
                        if (error.name !== 'AbortError') {
                            this.error = `Ошибка отправки: ${error.message}`;
                        }
                    }
                },

                generateShareText() {
                    let text = '🎲 Статистика времени по граням кубика:\n\n';
                    
                    Object.entries(this.faces).forEach(([face, time]) => {
                        const status = face === this.currentFace ? ' (текущая)' : '';
                        text += `${face}: ${this.formatTime(time)}${status}\n`;
                    });
                    
                    text += `\n⏱️ Общее время: ${this.formatTime(this.totalTime)}`;
                    text += `\n📅 ${new Date().toLocaleDateString('ru-RU')}`;
                    
                    return text;
                },

                async copyToClipboard(text) {
                    if (navigator.clipboard) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        // Fallback для старых браузеров
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                    }
                },

                formatTime(minutes) {
                    if (minutes === 0) return '0 мин';
                    if (minutes < 60) return `${minutes} мин`;
                    
                    const hours = Math.floor(minutes / 60);
                    const mins = minutes % 60;
                    return mins > 0 ? `${hours}ч ${mins}мин` : `${hours}ч`;
                },

                saveToLocalStorage() {
                    const data = {
                        faces: this.faces,
                        currentFace: this.currentFace,
                        totalTime: this.totalTime,
                        timestamp: Date.now()
                    };
                    localStorage.setItem('cubeData', JSON.stringify(data));
                },

                loadFromLocalStorage() {
                    try {
                        // Загрузка данных приложения
                        const saved = localStorage.getItem('cubeData');
                        if (saved) {
                            const data = JSON.parse(saved);
                            this.faces = { ...this.faces, ...data.faces };
                            this.currentFace = data.currentFace || '';
                            this.totalTime = data.totalTime || 0;
                            this.log('Данные приложения загружены из localStorage');
                        }
                        
                        // Загрузка логов
                        const savedLogs = localStorage.getItem('cubeLogs');
                        if (savedLogs) {
                            this.logs = JSON.parse(savedLogs);
                            this.log('Логи загружены из localStorage', { count: this.logs.length });
                        }
                        
                    } catch (error) {
                        this.log('Ошибка загрузки данных из localStorage', { error: error.message });
                        console.error('Ошибка загрузки данных:', error);
                    }
                },

                clearMessages() {
                    this.error = '';
                    this.success = '';
                    setTimeout(() => {
                        this.error = '';
                        this.success = '';
                    }, 5000);
                },

                // Поделиться логами (только в режиме отладки)
                async shareLogs() {
                    try {
                        const logsText = this.exportLogs();
                        const shareText = `🔍 Логи отладки приложения "Кубик"\n\n${logsText}\n\n📅 ${new Date().toLocaleString('ru-RU')}`;
                        
                        if (navigator.share) {
                            await navigator.share({
                                title: 'Логи отладки Кубика',
                                text: shareText
                            });
                            this.log('Логи отправлены через Web Share API');
                        } else {
                            // Fallback - копирование в буфер обмена
                            await this.copyToClipboard(shareText);
                            this.success = 'Логи скопированы в буфер обмена';
                            this.log('Логи скопированы в буфер обмена');
                        }
                    } catch (error) {
                        if (error.name !== 'AbortError') {
                            this.log('Ошибка отправки логов', { 
                                name: error.name,
                                message: error.message
                            });
                            this.error = `Ошибка отправки логов: ${error.message}`;
                        }
                    }
                },

                // Показать логи (только в режиме отладки) - альтернативный метод
                showLogs() {
                    const logsText = this.exportLogs();
                    const blob = new Blob([logsText], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `cube-logs-${new Date().toISOString().slice(0, 19)}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    this.log('Логи экспортированы в файл');
                },

                // Проверка и предложение установки PWA
                checkPWAInstall() {
                    // Проверяем, установлено ли приложение
                    const isInstalled = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
                    
                    if (!isInstalled && 'beforeinstallprompt' in window) {
                        this.log('PWA может быть установлена');
                        
                        // Сохраняем событие для использования позже
                        window.addEventListener('beforeinstallprompt', (e) => {
                            e.preventDefault();
                            this.deferredPrompt = e;
                            this.showInstallButton = true;
                            this.log('Событие установки PWA получено');
                        });
                        
                        // Отслеживаем установку
                        window.addEventListener('appinstalled', () => {
                            this.showInstallButton = false;
                            this.success = 'Приложение успешно установлено!';
                            this.log('PWA установлена');
                        });
                    } else if (isInstalled) {
                        this.log('Приложение запущено как PWA');
                    }
                },

                // Установка PWA
                async installPWA() {
                    if (!this.deferredPrompt) {
                        this.log('Событие установки недоступно');
                        return;
                    }
                    
                    this.deferredPrompt.prompt();
                    const { outcome } = await this.deferredPrompt.userChoice;
                    
                    if (outcome === 'accepted') {
                        this.log('Пользователь принял установку PWA');
                    } else {
                        this.log('Пользователь отклонил установку PWA');
                    }
                    
                    this.deferredPrompt = null;
                    this.showInstallButton = false;
                },

                // Обработка отсутствия поддержки Bluetooth
                handleNoBluetoothSupport() {
                    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
                    if (isIOS) {
                        this.error = 'Для работы на iOS: 1) Установите браузер Bluefy из App Store, затем 2) откройте это приложение в нём.';
                        this.log('Требуется браузер с поддержкой Web Bluetooth (Bluefy)');
                    } else {
                        this.error = 'Web Bluetooth не поддерживается. Используйте Chrome 70+.';
                    }
                },

                // Получение версии из README.md
                async getVersion() {
                    try {
                        const response = await fetch('/cube/README.md');
                        const text = await response.text();
                        const versionMatch = text.match(/Версия: ([0-9]+\.[0-9]+\.[0-9]+)/);
                        if (versionMatch) {
                            this.version = `v${versionMatch[1]}`;
                            this.log('Версия определена из README.md', { version: this.version });
                        }
                    } catch (error) {
                        this.log('Ошибка получения версии', { error: error.message });
                        // Оставляем версию по умолчанию
                    }
                }
            },

            mounted() {
                this.log('Приложение запущено', { 
                    debug: this.debug,
                    userAgent: navigator.userAgent,
                    bluetoothSupported: !!navigator.bluetooth,
                    isPWA: window.matchMedia('(display-mode: standalone)').matches,
                    isInstalled: window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches,
                    version: this.version
                });
                
                // Получение актуальной версии
                this.getVersion();
                
                // Проверка и предложение установить PWA
                this.checkPWAInstall();
                
                // Загрузка сохраненных данных при старте
                this.loadFromLocalStorage();
                
                // Проверка поддержки Web Bluetooth будет в методе connect()
                this.log('Проверка поддержки Web Bluetooth будет при попытке подключения');
            }
        }).mount('#app');
    </script>
</body>
</html>
